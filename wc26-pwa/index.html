<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0E1A" />
<title>World Cup 2026 — Matchday Board</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC26">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E1A; --ink2:#11172A; --ink3:#1A2238; --raise:#222C46;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
    --grass:#16C66B; --grass-dim:#0F8F4D;
    --live:#FF4848; --amber:#FFB020; --gold:#FFC53D;
    --mag:#FF3D81;
    --text:#EAF0FF; --muted:#8A93A8; --muted2:#586079;
    --r:16px;
    --shadow:0 12px 30px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--ink); color:var(--text);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
    min-height:100vh; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0 0 auto 0; height:340px; z-index:0; pointer-events:none;
    background:
      radial-gradient(120% 90% at 18% -20%, rgba(22,198,107,.20), transparent 60%),
      radial-gradient(120% 90% at 85% -30%, rgba(255,61,129,.16), transparent 60%);
  }
  .wrap{position:relative; z-index:1; max-width:980px; margin:0 auto; padding:0 14px 120px}

  header{position:sticky; top:0; z-index:40; backdrop-filter:blur(14px);
    background:linear-gradient(180deg,rgba(10,14,26,.92),rgba(10,14,26,.72)); border-bottom:1px solid var(--line)}
  .hbar{max-width:980px; margin:0 auto; padding:12px 14px 10px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .brand b{font-family:Anton; font-weight:400; letter-spacing:.5px; font-size:26px; line-height:1;
    background:linear-gradient(90deg,#fff,#bfe9d0 60%,var(--grass)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .brand span{font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-weight:700}
  .clock{font-family:Anton; font-size:20px; letter-spacing:1px; color:var(--text); line-height:1}
  .clock small{display:block; font-family:Inter; font-size:9px; letter-spacing:2px; color:var(--muted); font-weight:700}
  .hbtn{border:1px solid var(--line2); background:var(--ink3); color:var(--text); border-radius:999px;
    font-size:12.5px; font-weight:700; padding:9px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:.15s}
  .hbtn:hover{border-color:var(--grass); color:#fff}
  .hbtn.live[data-on="1"]{border-color:var(--mag); color:#fff}
  .dotpulse{width:8px;height:8px;border-radius:50%;background:var(--grass);box-shadow:0 0 0 0 rgba(22,198,107,.6);animation:pp 1.8s infinite}
  @keyframes pp{0%{box-shadow:0 0 0 0 rgba(22,198,107,.5)}70%{box-shadow:0 0 0 7px rgba(22,198,107,0)}100%{box-shadow:0 0 0 0 rgba(22,198,107,0)}}

  .next{max-width:980px;margin:0 auto;padding:0 14px 10px}
  .nextcard{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,var(--ink3),var(--ink2));
    border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .nextcard .lbl{font-size:10px;letter-spacing:2px;color:var(--gold);font-weight:800;text-transform:uppercase}
  .nextcard .mt{font-weight:700;font-size:14px}
  .nextcard .cd{margin-left:auto;font-family:Anton;font-size:22px;letter-spacing:1px;color:#fff}
  .nextcard .cd small{font-family:Inter;font-size:9px;color:var(--muted);letter-spacing:1px;display:block;text-align:right;font-weight:700}

  nav.tabs{position:sticky; top:60px; z-index:30; background:rgba(10,14,26,.9); backdrop-filter:blur(10px);
    display:flex; gap:6px; overflow-x:auto; padding:8px 0 10px; border-bottom:1px solid var(--line); scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto; border:1px solid transparent; background:transparent; color:var(--muted); font-weight:700; font-size:13.5px;
    padding:8px 14px; border-radius:999px; cursor:pointer; white-space:nowrap; transition:.15s}
  .tab:hover{color:var(--text)}
  .tab[aria-selected="true"]{background:var(--text); color:var(--ink)}

  h2.sec{font-family:Anton;font-weight:400;letter-spacing:.5px;font-size:22px;margin:22px 2px 4px;display:flex;align-items:center;gap:10px}
  .eyebrow{font-size:10px;letter-spacing:3px;color:var(--grass);font-weight:800;text-transform:uppercase;margin:18px 2px 0}
  .muted{color:var(--muted)}

  .day{font-size:12px;letter-spacing:2px;color:var(--muted);font-weight:800;text-transform:uppercase;margin:20px 2px 8px;
    display:flex;align-items:center;gap:10px}
  .day::after{content:"";flex:1;height:1px;background:var(--line)}
  .slab{background:linear-gradient(180deg,var(--ink2),#0d1322);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .slab:hover{transform:translateY(-2px);border-color:var(--line2);box-shadow:var(--shadow)}
  .slab .topline{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:9px}
  .gtag{background:var(--ink3);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:10px;letter-spacing:.5px;color:var(--text)}
  .tv{font-size:9.5px;font-weight:800;letter-spacing:.5px;padding:2px 6px;border-radius:5px;border:1px solid var(--line2)}
  .tv.bbc{color:#9fd0ff;border-color:rgba(159,208,255,.45);background:rgba(159,208,255,.10)}
  .tv.itv{color:#ffd24d;border-color:rgba(255,210,77,.45);background:rgba(255,210,77,.10)}
  .venue{margin-left:auto;text-align:right;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .side{display:flex;align-items:center;gap:9px;min-width:0}
  .side.away{flex-direction:row-reverse;text-align:right}
  .flag{font-size:24px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .nm{min-width:0}
  .nm .code{font-family:Anton;font-size:19px;letter-spacing:1px;line-height:1}
  .nm .full{font-size:11px;color:var(--muted);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score{font-family:Anton;font-size:30px;letter-spacing:2px;text-align:center;min-width:84px;line-height:1}
  .ko{font-family:Anton;font-size:17px;color:var(--text);text-align:center;min-width:84px;line-height:1.05}
  .ko small{display:block;font-family:Inter;font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:700;margin-top:3px}
  .moon{font-size:13px;vertical-align:middle}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.5px}
  .status.live{color:var(--amber)} .status.ft{color:var(--muted)}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pp2 1.4s infinite}
  @keyframes pp2{50%{opacity:.3}}
  .followbtn{position:absolute;top:10px;right:10px;background:transparent;border:none;cursor:pointer;font-size:17px;color:var(--muted2);padding:4px;line-height:1}
  .followbtn[data-on="1"]{color:var(--gold)}
  .unsocial{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--mag),transparent)}

  .grpcard{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:6px 4px 8px;margin-bottom:14px}
  .grphead{display:flex;align-items:center;gap:8px;padding:8px 12px 6px}
  .grphead b{font-family:Anton;font-size:16px;letter-spacing:1px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:800;text-transform:uppercase;text-align:center;padding:6px 4px}
  th.l,td.l{text-align:left}
  td{padding:7px 4px;text-align:center;border-top:1px solid var(--line)}
  td.team{display:flex;align-items:center;gap:8px;font-weight:700}
  td.pts{font-family:Anton;font-size:15px}
  tr.qual td{background:rgba(22,198,107,.06)}
  tr.qual td.pos{color:var(--grass)}
  .pos{font-weight:800;color:var(--muted);width:22px}

  .stathero{background:linear-gradient(135deg,var(--ink3),#0d1322);border:1px solid var(--line);border-radius:var(--r);padding:22px 18px;margin:14px 0;text-align:center;position:relative;overflow:hidden}
  .stathero::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 130% at 50% -25%,rgba(22,198,107,.20),transparent 60%);pointer-events:none}
  .stathero .big{font-family:Anton;font-size:66px;line-height:.9;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--grass));-webkit-background-clip:text;background-clip:text;color:transparent;position:relative}
  .stathero .lbl{font-size:11px;letter-spacing:3px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:8px}
  .stathero .sub{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.4}
  .lead{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:2px 4px 8px;margin-bottom:14px}
  .lead h3{font-family:Anton;font-weight:400;font-size:15px;letter-spacing:1px;margin:11px 12px 6px;display:flex;align-items:center;gap:8px}
  .lead h3 .tagicon{font-size:15px}
  .lrow{display:flex;align-items:center;gap:10px;padding:9px 12px;position:relative}
  .lrow + .lrow{border-top:1px solid var(--line)}
  .lrow .rk{font-family:Anton;font-size:14px;color:var(--muted);width:20px;text-align:center}
  .lrow.top{background:rgba(255,197,61,.06)} .lrow.top .rk{color:var(--gold)}
  .lrow .fl{font-size:20px}
  .lrow .pn{min-width:0;flex:1}
  .lrow .who{font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .tm{font-size:11px;color:var(--muted);font-weight:600}
  .lrow .val{font-family:Anton;font-size:19px;letter-spacing:1px}
  .lrow .bar{position:absolute;left:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--grass),transparent)}
  .pips{display:flex;gap:3px;align-items:center}
  .pip{width:8px;height:12px;border-radius:2px;display:inline-block}
  .pip.y{background:var(--gold)} .pip.r{background:var(--live)}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .csrow{display:flex;align-items:center;gap:8px;padding:8px 12px;font-weight:700;font-size:13.5px}
  .csrow + .csrow{border-top:1px solid var(--line)}
  .csrow .val{margin-left:auto;font-family:Anton;font-size:17px}
  @media(max-width:520px){.statgrid{grid-template-columns:1fr}.stathero .big{font-size:54px}}

  .kogrid{display:grid;gap:10px}
  .kround{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .kround h3{margin:0 0 4px;font-family:Anton;font-weight:400;font-size:16px;letter-spacing:1px}
  .kround .kr{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-top:1px solid var(--line);color:var(--muted)}
  .kround .kr:first-of-type{border-top:none}
  .kround .kr b{color:var(--text);font-weight:700}

  .teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .tcard{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;transition:.15s;position:relative}
  .tcard:hover{border-color:var(--line2);transform:translateY(-2px)}
  .tcard .fl{font-size:30px}
  .tcard .tn{font-weight:800;font-size:15px;margin-top:6px}
  .tcard .tg{font-size:11px;color:var(--muted);font-weight:700}
  .star{position:absolute;top:10px;right:11px;font-size:15px;color:var(--muted2);cursor:pointer}
  .star[data-on="1"]{color:var(--gold)}

  .scrim{position:fixed;inset:0;z-index:80;background:rgba(4,6,12,.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.2s}
  .scrim[data-open="1"]{opacity:1;pointer-events:auto}
  .sheet{position:fixed;z-index:81;left:50%;bottom:0;width:min(620px,100%);max-height:88vh;overflow:auto;
    background:var(--ink);border:1px solid var(--line2);border-radius:20px 20px 0 0;transform:translateX(-50%) translateY(100%);transition:.26s cubic-bezier(.2,.8,.2,1);padding:16px 16px 32px}
  .sheet[data-open="1"]{transform:translateX(-50%) translateY(0)}
  .sheet .grab{width:42px;height:4px;background:var(--line2);border-radius:99px;margin:0 auto 12px}
  .sheet .x{position:absolute;top:12px;right:14px;background:var(--ink3);border:1px solid var(--line);color:var(--text);border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:16px}
  .sbig{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:6px 0 8px}
  .sbig .fl{font-size:42px;text-align:center}
  .sbig .sc{font-family:Anton;font-size:40px;letter-spacing:2px;text-align:center}
  .sbig .tnm{text-align:center;font-weight:800;font-size:13px;margin-top:4px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:6px 0 14px}
  .chip{background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:11.5px;color:var(--muted);font-weight:700}
  .chip b{color:var(--text)}
  .tl{position:relative;margin:8px 0 4px}
  .ev{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13px}
  .ev:nth-child(odd){background:var(--ink2)}
  .ev .min{font-family:Anton;font-size:14px;min-width:34px;color:var(--gold)}
  .ev .ic{font-size:15px;width:20px;text-align:center}
  .ev .who{font-weight:700}
  .lineups{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .lu h4{margin:0 0 6px;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .lu div{font-size:12.5px;padding:3px 0;color:var(--text);border-bottom:1px solid var(--line)}
  .sheetbtns{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
  .sbtn{flex:1;min-width:130px;border:1px solid var(--line2);background:var(--ink3);color:var(--text);border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer}
  .sbtn.gold{background:var(--gold);color:#1a1400;border-color:transparent}
  .sbtn.mag[data-on="1"]{background:var(--mag);color:#fff;border-color:transparent}

  .controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
  .search{flex:1;min-width:180px;background:var(--ink2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit}
  .pill{border:1px solid var(--line);background:var(--ink2);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .pill[aria-pressed="true"]{background:var(--text);color:var(--ink)}

  .note{font-size:12px;color:var(--muted);background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;line-height:1.5;margin:14px 0}
  .note b{color:var(--text)}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}

  .toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:90;display:flex;flex-direction:column;gap:8px;width:min(440px,92%)}
  .toast{background:var(--ink3);border:1px solid var(--line2);border-left:4px solid var(--grass);border-radius:12px;padding:12px 14px;font-size:13px;box-shadow:var(--shadow);animation:tin .25s}
  .toast.goal{border-left-color:var(--mag)} .toast.ko{border-left-color:var(--gold)}
  .toast b{font-weight:800}
  @keyframes tin{from{transform:translateY(14px);opacity:0}}

  @media (max-width:560px){
    .brand b{font-size:22px}.score{font-size:26px;min-width:70px}.nm .code{font-size:17px}
    .clock{font-size:17px}.lineups{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand"><b>WC&nbsp;26</b><span>Matchday Board</span></div>
    <div class="clock" id="clock">--:--<small>UK · LONDON</small></div>
    <button class="hbtn live" id="bell" data-on="0" title="Notifications">🔔 <span id="bellTxt">Alerts off</span></button>
    <button class="hbtn" id="refresh" title="Pull live scores"><span class="dotpulse"></span> <span id="refTxt">Live</span></button>
  </div>
  <div class="next" id="nextWrap" style="display:none">
    <div class="nextcard">
      <span class="lbl">Next up</span>
      <span class="mt" id="nextMatch"></span>
      <span class="cd" id="nextCd">—<small id="nextWhen"></small></span>
    </div>
  </div>
  <nav class="tabs" id="tabs" role="tablist"></nav>
</header>

<div class="wrap" id="view"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
<div class="toasts" id="toasts"></div>

<script>
"use strict";

const TZ_UK = "Europe/London";

const VENUES = {
  azteca:{n:"Estadio Banorte (Azteca)", city:"Mexico City", country:"🇲🇽", tz:"America/Mexico_City"},
  akron:{n:"Estadio Akron", city:"Guadalajara", country:"🇲🇽", tz:"America/Mexico_City"},
  bbva:{n:"Estadio BBVA", city:"Monterrey", country:"🇲🇽", tz:"America/Monterrey"},
  bmo:{n:"BMO Field", city:"Toronto", country:"🇨🇦", tz:"America/Toronto"},
  bcplace:{n:"BC Place", city:"Vancouver", country:"🇨🇦", tz:"America/Vancouver"},
  sofi:{n:"SoFi Stadium", city:"Los Angeles", country:"🇺🇸", tz:"America/Los_Angeles"},
  levis:{n:"Levi's Stadium", city:"San Francisco Bay", country:"🇺🇸", tz:"America/Los_Angeles"},
  lumen:{n:"Lumen Field", city:"Seattle", country:"🇺🇸", tz:"America/Los_Angeles"},
  att:{n:"AT&T Stadium", city:"Dallas", country:"🇺🇸", tz:"America/Chicago"},
  arrowhead:{n:"Arrowhead Stadium", city:"Kansas City", country:"🇺🇸", tz:"America/Chicago"},
  nrg:{n:"NRG Stadium", city:"Houston", country:"🇺🇸", tz:"America/Chicago"},
  mbenz:{n:"Mercedes-Benz Stadium", city:"Atlanta", country:"🇺🇸", tz:"America/New_York"},
  hardrock:{n:"Hard Rock Stadium", city:"Miami", country:"🇺🇸", tz:"America/New_York"},
  gillette:{n:"Gillette Stadium", city:"Boston", country:"🇺🇸", tz:"America/New_York"},
  linc:{n:"Lincoln Financial Field", city:"Philadelphia", country:"🇺🇸", tz:"America/New_York"},
  metlife:{n:"MetLife Stadium", city:"New York / NJ", country:"🇺🇸", tz:"America/New_York"},
};

const TEAMS = {
  MEX:["Mexico","🇲🇽","A"], RSA:["South Africa","🇿🇦","A"], KOR:["South Korea","🇰🇷","A"], CZE:["Czechia","🇨🇿","A"],
  CAN:["Canada","🇨🇦","B"], SUI:["Switzerland","🇨🇭","B"], QAT:["Qatar","🇶🇦","B"], BIH:["Bosnia & Herz.","🇧🇦","B"],
  BRA:["Brazil","🇧🇷","C"], MAR:["Morocco","🇲🇦","C"], HAI:["Haiti","🇭🇹","C"], SCO:["Scotland","🏴󠁧󠁢󠁳󠁣󠁴󠁿","C"],
  USA:["United States","🇺🇸","D"], PAR:["Paraguay","🇵🇾","D"], AUS:["Australia","🇦🇺","D"], TUR:["Türkiye","🇹🇷","D"],
  GER:["Germany","🇩🇪","E"], CUW:["Curaçao","🇨🇼","E"], CIV:["Côte d'Ivoire","🇨🇮","E"], ECU:["Ecuador","🇪🇨","E"],
  NED:["Netherlands","🇳🇱","F"], JPN:["Japan","🇯🇵","F"], TUN:["Tunisia","🇹🇳","F"], SWE:["Sweden","🇸🇪","F"],

/* ===== State (persists via window.storage in preview, localStorage when hosted) ===== */
const DEFAULT_STATE = { followTeams:[], followMatches:[], notify:false, lastSeen:{}, refreshedAt:null, stats:{} };
let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
const mem = {};
async function loadState(){
  try{
    if(window.storage){ const r = await window.storage.get("wc26"); if(r && r.value) state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(r.value)); return; }
    const ls = (typeof localStorage!=="undefined") ? localStorage.getItem("wc26") : mem.wc26;
    if(ls) state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(ls));
  }catch(e){}
}
async function saveState(){
  const s = JSON.stringify(state);
  try{ if(window.storage){ await window.storage.set("wc26", s); return; } if(typeof localStorage!=="undefined"){ localStorage.setItem("wc26", s); return; } mem.wc26 = s; }
  catch(e){ mem.wc26 = s; }
}

/* ===== Helpers ===== */
const team = c => TEAMS[c] || [c,"🏳️","?"];
const fl = c => team(c)[1];
const nm = c => team(c)[0];
const venue = v => VENUES[v] || {n:"TBC",city:"",country:"",tz:TZ_UK};
function fmtUK(iso, withDate=false){ const opt = {timeZone:TZ_UK, hour:"2-digit", minute:"2-digit", hour12:false}; if(withDate){ opt.weekday="short"; opt.day="numeric"; opt.month="short"; } return new Intl.DateTimeFormat("en-GB", opt).format(new Date(iso)); }
function fmtLocal(iso, tz){ return new Intl.DateTimeFormat("en-GB",{timeZone:tz, hour:"2-digit", minute:"2-digit", hour12:false}).format(new Date(iso)); }
function ukDayKey(iso){ return new Intl.DateTimeFormat("en-CA",{timeZone:TZ_UK, year:"numeric", month:"2-digit", day:"2-digit"}).format(new Date(iso)); }
function ukDayLabel(iso){ return new Intl.DateTimeFormat("en-GB",{timeZone:TZ_UK, weekday:"long", day:"numeric", month:"long"}).format(new Date(iso)); }
function isLateUK(iso){ const h = +new Intl.DateTimeFormat("en-GB",{timeZone:TZ_UK,hour:"2-digit",hour12:false}).format(new Date(iso)); return h>=0 && h<7; }
function matchStatus(m){ if(m.score && m.status==="ft") return "ft"; if(m.status==="live"||m.status==="ht") return "live"; return "upcoming"; }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ===== Standings ===== */
function standings(group){
  const teams = Object.keys(TEAMS).filter(c=>team(c)[2]===group);
  const tab = {}; teams.forEach(c=>tab[c]={c,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0});
  MATCHES.filter(m=>m.group===group && m.score).forEach(m=>{
    const hs=+m.score[0], as_=+m.score[1]; const H=tab[m.h], A=tab[m.a]; if(!H||!A) return;
    H.P++;A.P++;H.GF+=hs;H.GA+=as_;A.GF+=as_;A.GA+=hs;
    if(hs>as_){H.W++;A.L++;H.Pts+=3;} else if(hs<as_){A.W++;H.L++;A.Pts+=3;} else {H.D++;A.D++;H.Pts++;A.Pts++;}
  });
  return Object.values(tab).map(r=>(r.GD=r.GF-r.GA,r)).sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || nm(a.c).localeCompare(nm(b.c)));
}

/* ===== Follow / next ===== */
function isFollowedMatch(m){ return state.followMatches.includes(m.id) || state.followTeams.includes(m.h) || state.followTeams.includes(m.a); }
function followedFixtures(){ return MATCHES.filter(isFollowedMatch).sort((a,b)=>new Date(a.t)-new Date(b.t)); }
function nextFollowed(){ const now=Date.now(); return followedFixtures().find(m=>new Date(m.t).getTime()>now-2*3600e3 && matchStatus(m)!=="ft"); }

const view = document.getElementById("view");

function renderTabs(){

    const b=el(`<button class="tab" role="tab">${label}</button>`);
    b.setAttribute("aria-selected", k===activeTab?"true":"false");
    b.onclick=()=>{activeTab=k; renderTabs(); render(); window.scrollTo({top:0,behavior:"smooth"});};

function slabHTML(m){
  const st=matchStatus(m); const v=venue(m.venue); const fwd=isFollowedMatch(m);
  let mid;
  if(st==="upcoming"){
    const late=isLateUK(m.t);
    mid=`<div class="ko">${fmtUK(m.t)}${late?' <span class="moon" title="Unsociable UK kick-off (after midnight)">🌙</span>':''}<small>${fmtLocal(m.t,v.tz)} local</small></div>`;
  } else {
    const sc=m.score?`${m.score[0]}–${m.score[1]}`:"0–0";
    mid=`<div class="score">${sc}</div>`;
  }
  const statusLine = st==="live"
    ? `<span class="status live"><span class="livedot"></span>${m.minute?esc(m.minute)+"'":"LIVE"}</span>`
    : st==="ft" ? `<span class="status ft">Full time</span>`
    : `<span class="status">${fmtUK(m.t,true)}</span>`;
  return `
  <div class="slab" data-mid="${m.id}">
    <button class="followbtn" data-fav="${m.id}" data-on="${fwd?1:0}" title="Follow match">★</button>
    <div class="topline">
      <span class="gtag">${m.stage==="group"?"Group "+m.group:esc(m.round||"Knockout")}</span>
      ${TVUK[m.id]?`<span class="tv ${TVUK[m.id].toLowerCase()}" title="UK broadcaster">${TVUK[m.id]}</span>`:""}
      ${statusLine}
      <span class="venue">${esc(v.n)} · ${esc(v.city)} ${v.country}</span>
    </div>
    <div class="row">
      <div class="side"><span class="flag">${fl(m.h)}</span><span class="nm"><span class="code">${esc(m.h)}</span><span class="full">${esc(nm(m.h))}</span></span></div>
      ${mid}
      <div class="side away"><span class="flag">${fl(m.a)}</span><span class="nm"><span class="code">${esc(m.a)}</span><span class="full">${esc(nm(m.a))}</span></span></div>
    </div>
    ${st==="upcoming"&&isLateUK(m.t)?`<div class="unsocial" title="Unsociable UK kick-off (after midnight)"></div>`:""}
  </div>`;
}

function renderToday(){
  const todayKey = ukDayKey(new Date().toISOString());
  const live = MATCHES.filter(m=>matchStatus(m)==="live");
  const today = MATCHES.filter(m=>ukDayKey(m.t)===todayKey).sort((a,b)=>new Date(a.t)-new Date(b.t));
  const upcoming = MATCHES.filter(m=>matchStatus(m)==="upcoming" && new Date(m.t)>Date.now()).sort((a,b)=>new Date(a.t)-new Date(b.t)).slice(0,6);
  let h="";
  if(live.length){ h+=`<div class="eyebrow">Live now</div>`+live.map(slabHTML).join(""); }
  h+=`<div class="eyebrow">Today · UK time</div>`;
  h+= today.length ? today.map(slabHTML).join("") : `<div class="empty">No matches scheduled for today (UK).<br>The tournament runs 11 Jun – 19 Jul 2026.</div>`;
  h+=`<div class="eyebrow">Coming up next</div>`+ (upcoming.length?upcoming.map(slabHTML).join(""):`<div class="empty">—</div>`);
  view.innerHTML=h;
}

let fxFilter={q:"",group:"all",mine:false};
function fxList(){
  let list = MATCHES.slice().sort((a,b)=>new Date(a.t)-new Date(b.t));
  if(fxFilter.group!=="all") list=list.filter(m=>m.group===fxFilter.group);
  if(fxFilter.mine) list=list.filter(isFollowedMatch);
  if(fxFilter.q){ const q=fxFilter.q.toLowerCase(); list=list.filter(m=>[nm(m.h),nm(m.a),m.h,m.a,venue(m.venue).city,venue(m.venue).n].join(" ").toLowerCase().includes(q)); }
  return list;
}
function renderFxResults(){
  const box=document.getElementById("fxResults"); if(!box) return;
  const list=fxList(); let cur=""; let body="";
  if(!list.length) body=`<div class="empty">No fixtures match that filter. Try clearing the search or group filter.</div>`;
  list.forEach(m=>{ const k=ukDayKey(m.t); if(k!==cur){cur=k; body+=`<div class="day">${ukDayLabel(m.t)}</div>`;} body+=slabHTML(m); });
  box.innerHTML=body; bindSlabClicks(box);
}
function renderFixtures(){
  let h=`<div class="controls">
    <input class="search" id="fxq" placeholder="Search team or city…" value="${esc(fxFilter.q)}">
    <button class="pill" data-grp="all" aria-pressed="${fxFilter.group==='all'}">All groups</button>
    <button class="pill" data-mine aria-pressed="${fxFilter.mine}">★ My teams</button>
  </div><div class="controls" id="grpPills"></div><div id="fxResults"></div>`;
  view.innerHTML=h;
  const gp=document.getElementById("grpPills");
  GROUPS.forEach(g=>{ const b=el(`<button class="pill" aria-pressed="${fxFilter.group===g}">Grp ${g}</button>`); b.onclick=()=>{fxFilter.group=fxFilter.group===g?"all":g; renderFixtures();}; gp.appendChild(b); });
  // typing updates only the results list, so the search box keeps focus
  document.getElementById("fxq").oninput=e=>{ fxFilter.q=e.target.value; renderFxResults(); };
  view.querySelector("[data-grp='all']").onclick=()=>{fxFilter.group="all"; renderFixtures();};
  view.querySelector("[data-mine]").onclick=()=>{fxFilter.mine=!fxFilter.mine; renderFixtures();};
  renderFxResults();
}

function renderGroups(){
  let h=`<div class="note">Standings update automatically from results. Tiebreakers (FIFA order): points → goal difference → goals scored → head-to-head → fair-play → drawing of lots. <b>Top 2 of each group + the 8 best 3rd-placed teams</b> reach the Round of 32.</div>`;
  GROUPS.forEach(g=>{
    const rows=standings(g);

/* ===== Stats ===== */
function computeTotals(){ let goals=0, played=0; MATCHES.forEach(m=>{ if(m.score){ goals+=(+m.score[0]||0)+(+m.score[1]||0); if(matchStatus(m)==="ft") played++; }}); return {goals,played}; }
function teamCleanSheets(){ const cs={}; MATCHES.forEach(m=>{ if(m.score && matchStatus(m)==="ft"){ if((+m.score[1]||0)===0) cs[m.h]=(cs[m.h]||0)+1; if((+m.score[0]||0)===0) cs[m.a]=(cs[m.a]||0)+1; }}); return Object.entries(cs).map(([c,n])=>({c,n})).sort((a,b)=>b.n-a.n); }
function aggFromEvents(){ const sc={}, cd={}; MATCHES.forEach(m=>(m.events||[]).forEach(e=>{ if(!e.player) return; const key=e.player+"|"+(e.team||""); if(e.type==="goal"){ (sc[key]=sc[key]||{player:e.player,team:e.team,goals:0}).goals++; } if(e.type==="yellow"||e.type==="red"){ const r=cd[key]=cd[key]||{player:e.player,team:e.team,yellow:0,red:0}; r[e.type]++; } })); return {scorers:Object.values(sc).sort((a,b)=>b.goals-a.goals), cards:Object.values(cd).sort((a,b)=>(b.red*2+b.yellow)-(a.red*2+a.yellow))}; }
function flagOf(t){ const c=code(t); return c?fl(c):"⚽"; }
function teamName(t){ const c=code(t); return c?nm(c):(t||""); }

function renderStats(){
  const tot=computeTotals(); const S=state.stats||{}; const agg=aggFromEvents();
  const scorers=(S.scorers&&S.scorers.length)?S.scorers:agg.scorers;
  const assists=(S.assists&&S.assists.length)?S.assists:[];
  const cards=(S.cards&&S.cards.length)?S.cards:agg.cards;
  const cs=(S.cleanSheets&&S.cleanSheets.length)? S.cleanSheets.map(x=>({c:code(x.team)||x.team,n:x.count})).sort((a,b)=>b.n-a.n) : teamCleanSheets();
  const maxG=scorers.length?Math.max(...scorers.map(s=>+s.goals||0),1):1;
  const asOf=state.refreshedAt?`Updated ${fmtUK(new Date(state.refreshedAt).toISOString(),true)} UK`:"Tap Live to pull player stats";
  let h=`
  <div class="stathero">
    <div class="big" id="goalCounter">${tot.goals}</div>
    <div class="lbl">Total tournament goals</div>
    <div class="sub">Across ${tot.played} completed ${tot.played===1?"match":"matches"} · includes extra time (penalty shootouts not counted as goals)</div>
  </div>
  <div class="lead"><h3><span class="tagicon">👟</span> Golden Boot — top scorers</h3>`;
  h+= scorers.length ? scorers.slice(0,10).map((s,i)=>`<div class="lrow ${i===0?'top':''}"><span class="rk">${i+1}</span><span class="fl">${flagOf(s.team)}</span><span class="pn"><div class="who">${esc(s.player||"")}</div><div class="tm">${esc(teamName(s.team))}</div></span><span class="val">${+s.goals||0}</span><span class="bar" style="width:${Math.round(((+s.goals||0)/maxG)*100)}%"></span></div>`).join("") : `<div class="empty">The Golden Boot race starts on 11 June. Tap <b>Live</b> during matches to fill this in.</div>`;
  h+=`</div><div class="statgrid"><div class="lead"><h3><span class="tagicon">🅰️</span> Most assists</h3>`;
  h+= assists.length ? assists.slice(0,8).map((s,i)=>`<div class="lrow ${i===0?'top':''}"><span class="rk">${i+1}</span><span class="fl">${flagOf(s.team)}</span><span class="pn"><div class="who">${esc(s.player||"")}</div><div class="tm">${esc(teamName(s.team))}</div></span><span class="val">${+s.assists||0}</span></div>`).join("") : `<div class="empty" style="padding:26px 10px">No assists recorded yet.</div>`;
  h+=`</div><div class="lead"><h3><span class="tagicon">🧤</span> Clean sheets</h3>`;
  h+= cs.length ? cs.slice(0,8).map(x=>`<div class="csrow"><span class="fl">${fl(x.c)||"🧤"}</span> <span>${esc(nm(x.c)||x.c)}</span><span class="val">${x.n}</span></div>`).join("") : `<div class="empty" style="padding:26px 10px">No clean sheets yet.</div>`;
  h+=`</div></div><div class="lead"><h3><span class="tagicon">🟨</span> Discipline — most booked</h3>`;
  h+= cards.length ? cards.slice(0,10).map((c,i)=>`<div class="lrow"><span class="rk">${i+1}</span><span class="fl">${flagOf(c.team)}</span><span class="pn"><div class="who">${esc(c.player||"")}</div><div class="tm">${esc(teamName(c.team))}</div></span><span class="pips">${"<span class='pip y'></span>".repeat(Math.min(+c.yellow||0,6))}${"<span class='pip r'></span>".repeat(Math.min(+c.red||0,2))}</span></div>`).join("") : `<div class="empty">No yellows or reds yet. Bookings appear here once matches begin.</div>`;
  h+=`</div><div class="note muted">${asOf}. Total goals and clean sheets are calculated from results, so they're exact for every completed match. Scorers, assists and cards come from the live feed and fill in as the tournament unfolds.</div>`;
  view.innerHTML=h;
  animateCount("goalCounter",tot.goals);
}
function animateCount(id,to){ const e=document.getElementById(id); if(!e) return; const reduce=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; if(reduce || to<=0){ e.textContent=to; return; } const dur=750, t0=performance.now(); (function step(t){ const p=Math.min(1,(t-t0)/dur); e.textContent=Math.round(to*(1-Math.pow(1-p,3))); if(p<1) requestAnimationFrame(step); })(t0); }

/* ===== ICS export ===== */
function icsTime(iso){ return new Date(iso).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,""); }
function buildICS(list){
  let out="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//WC26 Matchday Board//EN\r\nCALSCALE:GREGORIAN\r\n";
  list.forEach(m=>{ const v=venue(m.venue); const end=new Date(new Date(m.t).getTime()+115*6e4);
    out+="BEGIN:VEVENT\r\n"+`UID:wc26-${m.id}@matchday\r\n`+`DTSTAMP:${icsTime(new Date().toISOString())}\r\n`+`DTSTART:${icsTime(m.t)}\r\n`+`DTEND:${icsTime(end.toISOString())}\r\n`+`SUMMARY:${nm(m.h)} v ${nm(m.a)} — WC26${m.group?" Grp "+m.group:""}\r\n`+`LOCATION:${v.n}\\, ${v.city}\r\n`+`DESCRIPTION:Kick-off ${fmtUK(m.t)} UK / ${fmtLocal(m.t,v.tz)} local.${TVUK[m.id]?" Watch on "+TVUK[m.id]+".":""}\r\n`+"BEGIN:VALARM\r\nTRIGGER:-PT30M\r\nACTION:DISPLAY\r\nDESCRIPTION:Kick-off in 30 min\r\nEND:VALARM\r\n"+"END:VEVENT\r\n"; });
  return out+"END:VCALENDAR";
}
function downloadICS(list,fname){ if(!list.length){ toast("Nothing to add","Follow a team or match first.",""); return; } const blob=new Blob([buildICS(list)],{type:"text/calendar"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=fname||"wc26-my-matches.ics"; a.click(); setTimeout(()=>URL.revokeObjectURL(url),2000); toast("Calendar file ready","Open it to add these to your calendar with 30-min reminders.",""); }
function exportICS(){ downloadICS(followedFixtures(),"wc26-my-matches.ics"); }

/* ===== Live refresh (tries both proxy paths; football-data + optional AI) ===== */
const refreshBtn=document.getElementById("refresh");
let refreshing=false; refreshBtn.onclick=()=>liveRefresh(false);
const LIVE_ENDPOINTS=["/api/live","/.netlify/functions/live"];

async function fetchLive(ukToday){
  let sawEndpoint=false;
  for(const ep of LIVE_ENDPOINTS){
    let res;
    try{ res=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({date:ukToday})}); }
    catch(e){ continue; }
    if(res.status===404){ continue; }
    sawEndpoint=true;
    if(res.ok){ const d=await res.json(); const data=Array.isArray(d)?{matches:d,stats:{}}:{matches:(d&&d.matches)||[],stats:(d&&d.stats)||{},source:(d&&d.source)||[]}; data.ok=true; return data; }
    let detail=""; try{ detail=(await res.json()).error||""; }catch(_){}
    if(/no data source/i.test(detail)) return {ok:false, problem:"nosource", detail, matches:[], stats:{}};
    if(/api[_ ]?key|token/i.test(detail) || res.status===500) return {ok:false, problem:"key", detail, matches:[], stats:{}};
    return {ok:false, problem:"server", detail, matches:[], stats:{}};
  }
  return {ok:false, problem: sawEndpoint?"unreachable":"endpoint", matches:[], stats:{}};
}

async function liveRefresh(silent){
  if(refreshing) return; refreshing=true;
  const txt=document.getElementById("refTxt"); txt.textContent="Updating…";
  try{
    const ukToday=new Intl.DateTimeFormat("en-GB",{timeZone:TZ_UK,weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(new Date());
    const out=await fetchLive(ukToday);
    txt.textContent="Live";
    if(!out.ok){
      const msg={
        endpoint:"The live function isn't deployed. Check netlify/functions/live.js is in your repo and that Netlify → Site → Functions lists a 'live' function.",
        nosource:"The data function is running, but no data source is set. Add FOOTBALL_DATA_TOKEN in your host's environment variables, then redeploy.",
        key:"The data function is running, but its token isn't set on your host yet. Add it and redeploy.",
        server:"The data function returned an error. Check its logs on your host.",
        unreachable:"Couldn't reach the data function. The built-in schedule, standings and stats still work."
      }[out.problem]||"Couldn't reach live data.";
      if(!silent) toast("Live data unavailable", out.detail||msg, "");
      refreshing=false; return;
    }
    let merged=0; (out.matches||[]).forEach(r=>{ if(mergeLive(r)) merged++; });
    if(out.stats && (out.stats.scorers||out.stats.assists||out.stats.cards||out.stats.cleanSheets)) state.stats=out.stats;
    state.refreshedAt=Date.now(); saveState(); render();
    const hasStats=out.stats && ((out.stats.scorers&&out.stats.scorers.length)||(out.stats.cards&&out.stats.cards.length));
    const src=(out.source&&out.source.length)?" · via "+out.source.join(" + "):"";
    if(!silent) toast(merged||hasStats?"Updated":"Up to date", merged||hasStats ? `${merged} match${merged===1?"":"es"} refreshed${hasStats?" · leaders updated":""}${src} · ${fmtUK(new Date().toISOString())} UK` : `Connected${src} — no live matches right now. The tournament starts 11 June.`,"");
  }catch(e){ txt.textContent="Live"; if(!silent) toast("Live data unavailable","Showing the built-in schedule. The data function couldn't be reached.",""); }
  refreshing=false;
}

const NAME2CODE=(()=>{ const m={}; Object.keys(TEAMS).forEach(c=>{ m[nm(c).toLowerCase()]=c; m[c.toLowerCase()]=c; });
  Object.assign(m,{"usa":"USA","united states of america":"USA","united states":"USA","korea republic":"KOR","south korea":"KOR","republic of korea":"KOR","ivory coast":"CIV","cote d'ivoire":"CIV","turkey":"TUR","türkiye":"TUR","czech republic":"CZE","czechia":"CZE","cape verde":"CPV","cabo verde":"CPV","bosnia and herzegovina":"BIH","bosnia-herzegovina":"BIH","dr congo":"COD","congo dr":"COD","curacao":"CUW","ir iran":"IRN","iran":"IRN","saudi arabia":"KSA"}); return m; })();
function code(name){ if(!name) return null; const k=String(name).toLowerCase().trim(); return NAME2CODE[k]||(TEAMS[name.toUpperCase()]?name.toUpperCase():null); }

function mergeLive(r){
  const h=code(r.home), a=code(r.away); if(!h||!a) return false;
  let m=MATCHES.find(x=>(x.h===h&&x.a===a)||(x.h===a&&x.a===h));
  const flip=m&&m.h!==h;
  if(!m){ m={id:"live_"+h+a, stage:"group", group:team(h)[2]===team(a)[2]?team(h)[2]:"", h, a, venue:"", t:new Date().toISOString()}; MATCHES.push(m); }
  const prev=m.score?m.score.slice():null;
  if(r.homeScore!=null && r.awayScore!=null){ m.score=flip?[r.awayScore,r.homeScore]:[r.homeScore,r.awayScore]; }
  if(r.status) m.status=r.status; if(r.minute) m.minute=r.minute;
  if(Array.isArray(r.events)&&r.events.length){ m.events=r.events.map(e=>({team:code(e.team)||e.team,player:e.player,minute:e.minute,type:e.type})); }
  if(state.notify && prev && m.score && isFollowedMatch(m) && (m.score[0]+m.score[1])>(prev[0]+prev[1])){ notify("GOAL!", `${fl(m.h)} ${m.score[0]}–${m.score[1]} ${m.a} ${fl(m.a)}`,"goal"); }
  return true;
}

/* ===== Init ===== */
window.WC={close:closeSheet};
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSheet(); });
(async function init(){
  await loadState();
  bell.dataset.on=state.notify?1:0; document.getElementById("bellTxt").textContent=state.notify?"Alerts on":"Alerts off";
  renderTabs(); render(); tick(); setInterval(tick,30000);
  liveRefresh(true); // pull live data when the app opens
  document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") liveRefresh(true); }); // and when you switch back to it
})();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("service-worker.js").catch(()=>{}); }); }
</script>
